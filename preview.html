<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clinical AI Analyzer</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#f4f6f9; }
.upload-area {
  border:2px dashed #aaa;
  padding:40px;
  text-align:center;
  cursor:pointer;
  border-radius:12px;
  transition:.2s;
}
.upload-area:hover { border-color:#0d6efd; }
</style>
</head>

<body>
<div class="container py-5">
<h2>🧠 Clinical AI Analyzer</h2>

<div class="upload-area" id="uploadArea">
  Click or Drag file here
  <input type="file" id="fileInput" hidden>
</div>

<div id="loading" class="alert alert-secondary mt-3 d-none">Analyzing...</div>
<div id="result" class="mt-3"></div>

</div>

<script>
const uploadArea = document.getElementById('uploadArea');
const fileInput = document.getElementById('fileInput');
const loading = document.getElementById('loading');
const result = document.getElementById('result');

uploadArea.onclick = () => fileInput.click();

// 防止拖拽打开文件
window.addEventListener('dragover', e => e.preventDefault());
window.addEventListener('drop', e => e.preventDefault());

uploadArea.addEventListener('drop', e => {
  e.preventDefault();
  handleFile(e.dataTransfer.files[0]);
});

fileInput.addEventListener('change', e => {
  handleFile(e.target.files[0]);
});

function showLoading(show=true){
  loading.classList.toggle('d-none', !show);
}

function showError(msg){
  result.innerHTML = `<div class="alert alert-danger">${msg}</div>`;
}

// 假AI（稳定版）
function fakePredict(){
  const classes = ['Avulsion','Spiral','Oblique','Comminuted'];
  return classes[Math.floor(Math.random()*classes.length)];
}

async function handleFile(file){
  if(!file) return;

  if(file.size > 5 * 1024 * 1024){
    showError('File too large (max 5MB)');
    return;
  }

  showLoading(true);
  result.innerHTML = '';

  try{
    if(file.type.startsWith('image/')){
      await new Promise(r=>setTimeout(r,1000)); // 模拟加载
      const pred = fakePredict();
      result.innerHTML = `<div class="alert alert-success">
        Prediction: <b>${pred}</b>
      </div>`;
    }
    else if(file.name.endsWith('.csv')){
      const text = await file.text();
      result.innerHTML = `<pre>${text}</pre>`;
    }
    else{
      showError('Unsupported file type');
    }
  }catch(e){
    console.error(e);
    showError('Analysis failed');
  }

  showLoading(false);
}
</script>
</body>
</html>
